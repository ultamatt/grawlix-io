services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:3000"
      - "1337:1337"
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-1337}
      WEBHOOKS_POPULATE_RELATIONS: ${WEBHOOKS_POPULATE_RELATIONS:-false}
      STRAPI_TELEMETRY_DISABLED: ${STRAPI_TELEMETRY_DISABLED:-true}
    volumes:
      - cms_data:/app/apps/cms/.tmp
      - cms_uploads:/app/apps/cms/public/uploads

volumes:
  cms_data:
  cms_uploads:
