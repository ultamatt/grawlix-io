services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Hardcoded to the nginx origin so the Astro build always routes through
        # the reverse proxy, regardless of what PUBLIC_CMS_URL is set to in .env.
        PUBLIC_CMS_URL: "http://localhost"
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "1337:1337"
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-80}
      STRAPI_PORT: ${STRAPI_PORT:-1337}
      WEBHOOKS_POPULATE_RELATIONS: ${WEBHOOKS_POPULATE_RELATIONS:-false}
      STRAPI_TELEMETRY_DISABLED: ${STRAPI_TELEMETRY_DISABLED:-true}
    volumes:
      - cms_data:/app/apps/cms/.tmp
      - cms_uploads:/app/apps/cms/public/uploads

volumes:
  cms_data:
  cms_uploads:
